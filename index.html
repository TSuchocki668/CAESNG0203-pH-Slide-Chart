<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Georgia,serif;background:#fff;padding:14px 20px;max-width:700px;margin:0 auto}
  h2{text-align:center;font-size:17px;font-weight:bold;color:#111827;margin-bottom:12px}
  .zones{display:flex;justify-content:space-between;margin-bottom:6px}
  .z{font-size:12px;font-weight:bold}
  .z-a{color:#b91c1c}.z-n{color:#15803d}.z-b{color:#1d4ed8}
  #bar-wrap{position:relative;margin:28px 0 4px;touch-action:none;user-select:none}
  #bar{width:100%;height:34px;border-radius:17px;background:linear-gradient(to right,#dc2626,#ea580c 14%,#ca8a04 29%,#84cc16 43%,#22c55e 50%,#14b8a6 64%,#0ea5e9 79%,#1d4ed8);position:relative;cursor:pointer}
  .dot{position:absolute;top:50%;width:12px;height:12px;border-radius:50%;border:2.5px solid white;transform:translate(-50%,-50%);pointer-events:none;transition:box-shadow .15s,transform .15s;z-index:3}
  .dot.lit{transform:translate(-50%,-50%) scale(1.8);box-shadow:0 0 10px 3px var(--dc)}
  #thumb{position:absolute;top:50%;width:28px;height:28px;border-radius:50%;background:white;border:3px solid #1f2937;transform:translate(-50%,-50%);z-index:10;cursor:grab;box-shadow:0 2px 8px rgba(0,0,0,.3)}
  #thumb:active{cursor:grabbing}
  #bubble{position:absolute;top:-32px;left:50%;transform:translateX(-50%);background:#111827;color:white;padding:3px 10px;border-radius:20px;font-size:13px;font-weight:bold;white-space:nowrap;pointer-events:none}
  .ticks{display:flex;justify-content:space-between;margin-top:4px}
  .tick{font-size:10px;color:#6b7280;flex:1;text-align:center}
  #card{min-height:130px;border-radius:12px;padding:16px 18px;margin-top:14px;border-left:5px solid #e5e7eb;background:#f9fafb;transition:border-color .2s}
  .card-ph{font-size:11px;color:#111827;margin-bottom:3px;font-style:italic;font-weight:bold}
  .card-title{font-size:15px;font-weight:bold;color:#111827;margin-bottom:8px}
  .card-body{font-size:13px;line-height:1.68;color:#374151}
  .idle{color:#9ca3af;font-style:italic;font-size:13px}
  .hint{font-size:12px;color:#0f766e;font-style:italic;font-weight:bold;text-align:center;margin-top:10px}
  .tagline{font-size:11px;color:#aaa;font-style:italic;margin-top:16px}
</style>

<h2>The pH Scale</h2>
<div class="zones">
  <span class="z z-a">Acidic</span>
  <span class="z z-n">Neutral</span>
  <span class="z z-b">Alkaline</span>
</div>

<div id="bar-wrap">
  <div id="bar">
    <div id="thumb"><div id="bubble">pH 7.0</div></div>
  </div>
  <div class="ticks" id="ticks"></div>
</div>

<div id="card"><p class="idle">Drag the slider to explore the pH scale and discover what lives at each level.</p></div>
<p class="hint">Drag the slider — some discoveries are surprising</p>
<p class="tagline">Environmental Science through Nature's Genius</p>

<script>
const PTS = [
  {ph:0,   c:'#dc2626', title:'Acidophile environments', sub:'pH 0–1',
   body:'Picrophilus torridus grows at pH 0 in volcanic soils in Japan — so acidic it dissolves most metals. These organisms maintain near-neutral chemistry inside their cells through specialized membrane proteins, revealing that life can persist in conditions hostile to almost every other organism on Earth.'},
  {ph:2,   c:'#ea580c', title:'Stomach acid', sub:'pH 2',
   body:'Human stomach acid is strong enough to denature most proteins and kill the majority of ingested bacteria. The stomach lining protects itself with a thick mucus layer renewed every few days. Helicobacter pylori survives here by producing enzymes that neutralize acid locally — one of the few organisms that can call your stomach home.'},
  {ph:3.5, c:'#b45309', title:'Acid rain', sub:'pH 3–5',
   body:'Unaffected rainfall is already slightly acidic at pH 5.6, due to dissolved CO₂. Industrial acid rain — formed when sulfur dioxide and nitrogen oxides dissolve in atmospheric moisture — can reach pH 3 to 4, dissolving calcium carbonate from fish eggs and aquatic invertebrate shells, disrupting freshwater food webs across entire lake systems.'},
  {ph:5,   c:'#a16207', title:'Black coffee and forest soils', sub:'pH 5',
   body:'Black coffee sits around pH 5 — mild and familiar. Many forest soils share this range, shaped by organic acids released as fallen leaves decompose. Blueberries, azaleas, and many conifers thrive near pH 4.5 to 5.5, where specific nutrients become chemically accessible and others are locked away.'},
  {ph:5.7, c:'#65a30d', title:'Human skin surface', sub:'pH 5.5–6',
   body:'Your skin maintains a pH of 5.5 to 6 — slightly acidic. This "acid mantle" inhibits the growth of harmful bacteria while supporting beneficial microbes in your skin microbiome. Many soaps and cleansers disrupt this balance, which is why skin can feel dry or irritated after washing.'},
  {ph:6.5, c:'#92400e', title:'Soil pH', sub:'pH 5–8 (typical range)',
   body:'Most productive soils fall between pH 5 and 8, but small differences strongly determine what can grow. Blueberries thrive around pH 4.5 to 5.5. Wheat and corn prefer near-neutral soils around pH 6 to 7, where phosphorus and calcium are most available. Desert soils often reach pH 8 or above as alkaline minerals accumulate where rainfall cannot flush them away. In natural systems, decomposing organic matter releases acids that gradually lower pH, while the weathering of mineral-rich bedrock slowly raises it. Plant communities and soil chemistry shape each other over time, each influencing what the other can become.'},
  {ph:7,   c:'#22c55e', title:'Pure water', sub:'pH 7',
   body:'Pure water is the chemical definition of neutral — equal concentrations of hydrogen and hydroxide ions. Most healthy freshwater ecosystems sit near this range. Fish, amphibians, and aquatic invertebrates are highly sensitive to pH shifts, which is why acid rain dropping lake pH toward 5 is so ecologically damaging.'},
  {ph:7.4, c:'#0f766e', title:'Human blood', sub:'pH 7.4',
   body:'Your blood maintains pH 7.4 with remarkable precision. A shift of just 0.2 units causes measurable symptoms. A shift of 0.4 units can be fatal. Chemical buffers — molecules that absorb or release hydrogen ions — and continuous fine-tuning by the kidneys and lungs keep blood chemistry locked within this narrow window.'},
  {ph:8.1, c:'#0369a1', title:'Ocean', sub:'pH 8.1',
   body:'The ocean averages pH 8.1, slightly alkaline. Since industrialization began, ocean pH has dropped by 0.1 units as seawater absorbs excess CO₂, which forms carbonic acid. That shift represents a 26% increase in acidity — enough to weaken coral skeletons, oyster shells, and the calcium carbonate structures of countless marine organisms.'},
  {ph:9,   c:'#2563eb', title:'Baking soda and alkaline soils', sub:'pH 9',
   body:'Baking soda dissolved in water reaches about pH 9. Some desert soils and dry lake beds reach similar alkalinity as minerals accumulate where rainfall is scarce. Specialized plants including saltbush and certain grasses tolerate these conditions through root chemistry that concentrates or excludes alkaline ions.'},
  {ph:11,  c:'#4f46e5', title:'East African soda lakes', sub:'pH 10–12',
   body:'Lake Natron in Tanzania and Lake Bogoria in Kenya reach pH 10 to 12 — caustic enough to damage unprotected skin. Yet lesser flamingos, sometimes numbering in the millions, feed almost exclusively on the alkaliphilic cyanobacterium Arthrospira, which thrives here. Extreme alkalinity deters most predators, making soda lakes among the safest nesting environments on Earth.'}
];

const SNAP = 0.6;
let dragging = false;

window.addEventListener('load', function() {
  const bar   = document.getElementById('bar');
  const thumb = document.getElementById('thumb');
  const bubble= document.getElementById('bubble');
  const card  = document.getElementById('card');
  const ticks = document.getElementById('ticks');

  for(let i=0;i<=14;i++){
    const t=document.createElement('span');
    t.className='tick'; t.textContent=i; ticks.appendChild(t);
  }

  const dots = PTS.map(p=>{
    const d=document.createElement('div');
    d.className='dot';
    d.style.setProperty('--dc',p.c);
    d.style.background=p.c;
    d.style.left=(p.ph/14*100)+'%';
    bar.appendChild(d);
    return {el:d, point:p};
  });

  function getBarRect(){ return bar.getBoundingClientRect(); }

  function clientXToFrac(cx){
    const r=getBarRect();
    return Math.max(0,Math.min(1,(cx-r.left)/r.width));
  }

  function update(frac){
    const ph=frac*14;
    thumb.style.left=(frac*100)+'%';
    bubble.textContent='pH '+ph.toFixed(1);
    dots.forEach(({el,point})=>{
      const near=Math.abs(point.ph-ph)<SNAP;
      el.classList.toggle('lit',near);
    });
    let nearest=null, dist=Infinity;
    PTS.forEach(p=>{ const d=Math.abs(p.ph-ph); if(d<dist){dist=d;nearest=p;} });
    if(dist<SNAP&&nearest){
      card.style.borderColor=nearest.c;
      card.innerHTML=`<div class="card-ph">${nearest.sub}</div><div class="card-title">${nearest.title}</div><p class="card-body">${nearest.body}</p>`;
    } else {
      card.style.borderColor='#e5e7eb';
      card.innerHTML=`<p class="idle">pH ${ph.toFixed(1)} — keep sliding to discover points of interest</p>`;
    }
  }

  thumb.addEventListener('mousedown',e=>{dragging=true;e.preventDefault();});
  document.addEventListener('mousemove',e=>{ if(dragging) update(clientXToFrac(e.clientX)); });
  document.addEventListener('mouseup',()=>dragging=false);
  bar.addEventListener('click',e=>update(clientXToFrac(e.clientX)));
  thumb.addEventListener('touchstart',e=>{dragging=true;e.preventDefault();},{passive:false});
  document.addEventListener('touchmove',e=>{ if(dragging) update(clientXToFrac(e.touches[0].clientX)); },{passive:true});
  document.addEventListener('touchend',()=>dragging=false);

  update(0.5);
});
</script>
